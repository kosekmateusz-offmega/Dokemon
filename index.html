<title>Dokemon</title>
<style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { 
        background:#222; 
        display:flex; 
        justify-content:center;
        align-items:center;
        min-height:100vh;
        overflow:hidden;
        touch-action:none;
        user-select:none;
        -webkit-user-select:none;
        position:relative;
    }
    #gameWrapper {
        position:relative;
        max-width:1100px;
        width:100%;
        height:100vh;
        max-height:750px;
        display:flex;
        align-items:center;
        justify-content:center;
        padding:5px;
        flex-direction:column;
    }
    
    #statusBar {
        width: 100%;
        max-width: 1100px;
        height: 50px;
        background-image: url('menu.png');
        background-size: 100% 100%;
        background-repeat: no-repeat;
        position: relative;
        flex-shrink: 0;
        border-radius: 8px 8px 0 0;
        overflow: hidden;
        margin: 0 auto;
        display: none;
    }
    
    #statusBar.active {
        display: block;
    }
    
    #statusBar .status-content {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 15px;
        box-sizing: border-box;
    }
    
    .left-section {
        display: flex;
        align-items: center;
        gap: 30px;
        margin-left: 80px;
        margin-top: 2px;
    }
    
    .right-section {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-right: 50px;
        margin-top: 2px;
    }
    
    .status-item {
        display: flex;
        align-items: center;
        gap: 6px;
        font-size: 15px;
        font-weight: bold;
        color: #4a3520;
        font-family: 'Courier New', Courier, monospace;
        letter-spacing: 0.5px;
    }
    
    .status-item .icon {
        width: 33px;
        height: 33px;
        display: block;
    }
    
    .status-item .value {
        color: #4a3520;
        min-width: 30px;
    }
    .status-item .value.gold { color: #4a3520; }
    .status-item .value.blue { color: #4a3520; }
    
    .stamina-mini {
        display: flex;
        align-items: center;
        gap: 6px;
    }
    .stamina-mini-bar {
        width: 100px;
        height: 14px;
        background: rgba(0,0,0,0.3);
        border: 1px solid rgba(74, 53, 32, 0.3);
        border-radius: 4px;
        overflow: hidden;
        margin-right: -5px;
    }
    .stamina-mini-fill {
        height: 100%;
        background: #2ecc71;
        transition: width 0.15s ease, background-color 0.3s ease;
        border-radius: 3px;
    }
    .stamina-mini .value {
        color: #4a3520;
        font-size: 13px;
        min-width: 28px;
        font-weight: bold;
    }
    
    .btn-icon {
        background: transparent;
        border: none;
        padding: 0;
        cursor: pointer;
        width: 33px;
        height: 33px;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 4px;
        transition: opacity 0.2s;
        opacity: 0.7;
    }
    .btn-icon:hover {
        opacity: 1;
    }
    .btn-icon img {
        width: 33px;
        height: 33px;
        display: block;
        pointer-events: none;
    }
    
    #gameContainer { 
        display:flex;
        flex-direction:column;
        position:relative;
        border:2px solid #333;
        border-radius:8px;
        overflow:hidden;
        width:100%;
        max-width:1100px;
        aspect-ratio:1100/700;
        background-image: url('background.png');
        background-size: 220px 220px;
        background-repeat: repeat;
    }
    
    #statusBar.active + #gameContainer {
        border-radius: 0 0 8px 8px;
        border-top: none;
    }
    
    #gameCanvas { 
        display:block;
        width:100%;
        height:100%;
        background:transparent;
        touch-action:none;
        cursor:pointer;
        image-rendering:pixelated;
        object-fit:contain;
    }
    
    #touchControls {
        position:absolute;
        bottom:50px;
        left:0;
        right:0;
        display:none;
        justify-content:space-between;
        padding:0 20px;
        pointer-events:none;
        z-index:10;
    }
    
    #touchControls.active {
        display:flex !important;
    }
    
    #joystickZone {
        width:140px;
        height:140px;
        background:rgba(255,255,255,0.12);
        border-radius:50%;
        position:relative;
        pointer-events:auto;
        touch-action:none;
        border:2px solid rgba(255,255,255,0.2);
        backdrop-filter:blur(4px);
        -webkit-backdrop-filter:blur(4px);
    }
    #joystickKnob {
        width:55px;
        height:55px;
        background:rgba(255,255,255,0.4);
        border-radius:50%;
        position:absolute;
        top:50%;
        left:50%;
        transform:translate(-50%, -50%);
        pointer-events:none;
        border:2px solid rgba(255,255,255,0.5);
        box-shadow:0 0 20px rgba(255,255,255,0.1);
        transition:none;
    }
    #actionButton {
        width:90px;
        height:90px;
        background:rgba(231,76,60,0.6);
        border-radius:50%;
        border:3px solid rgba(255,255,255,0.4);
        pointer-events:auto;
        touch-action:none;
        display:flex;
        align-items:center;
        justify-content:center;
        backdrop-filter:blur(4px);
        -webkit-backdrop-filter:blur(4px);
        box-shadow:0 0 30px rgba(231,76,60,0.2);
        overflow:hidden;
    }
    #actionButton:active {
        transform:scale(0.9);
        background:rgba(192,57,43,0.8);
    }
    #actionButton img {
        width:90px;
        height:90px;
        display:block;
        pointer-events:none;
        object-fit:contain;
    }
</style>

const joystickKnob = document.getElementById('joystickKnob');

const keys = { w:false, a:false, s:false, d:false };

function updateJoystick(e) {
    e.preventDefault();
    const touch = e.touches ? e.touches[0] : e;
    const rect = joystickZone.getBoundingClientRect();
    const cx = rect.left + rect.width/2;
    const cy = rect.top + rect.height/2;
    const maxR = rect.width/2 - 20;
    let dx = touch.clientX - cx;
    let dy = touch.clientY - cy;
    const dist = Math.sqrt(dx*dx + dy*dy);
    const clamped = Math.min(dist, maxR);
    if (dist > 0) {
        const angle = Math.atan2(dy, dx);
        const cdx = Math.cos(angle) * clamped;
        const cdy = Math.sin(angle) * clamped;
        const normX = cdx / maxR;
        const normY = cdy / maxR;
        joystickKnob.style.transform = `translate(calc(-50% + ${cdx}px), calc(-50% + ${cdy}px))`;
        const t = 0.25;
        keys.w = normY < -t;
        keys.s = normY > t;
        keys.a = normX < -t;
        keys.d = normX > t;
    }
}

function resetJoystick() {
    joystickActive = false;
    joystickKnob.style.transform = 'translate(-50%, -50%)';
    keys.w = false; keys.s = false; keys.a = false; keys.d = false;
}

let joystickActive = false;
joystickZone.addEventListener('touchstart', e => {
    e.preventDefault();
    joystickActive = true;
    updateJoystick(e);
}, {passive:false});
joystickZone.addEventListener('touchmove', e => {
    e.preventDefault();
    if (joystickActive) updateJoystick(e);
}, {passive:false});
joystickZone.addEventListener('touchend', e => {
    e.preventDefault();
    resetJoystick();
}, {passive:false});
joystickZone.addEventListener('touchcancel', resetJoystick, {passive:false});

let mouseJoy = false;
joystickZone.addEventListener('mousedown', e => {
    mouseJoy = true;
    updateJoystick(e);
});
document.addEventListener('mousemove', e => {
    if (mouseJoy) updateJoystick(e);
});
document.addEventListener('mouseup', () => {
    if (mouseJoy) { mouseJoy = false; resetJoystick(); }
});

function doAttack(e) {
    e.preventDefault();
    e.stopPropagation();
    const rect = canvas.getBoundingClientRect();
    const ev = new MouseEvent('mousedown', { 
        clientX: rect.left + rect.width/2,
        clientY: rect.top + rect.height/2
    });
    canvas.dispatchEvent(ev);
}
actionBtn.addEventListener('touchstart', doAttack, {passive:false});
actionBtn.addEventListener('mousedown', doAttack);

document.addEventListener('keydown', e => keys[e.key.toLowerCase()] = true);
document.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);

function checkCollision(x, y, size) {
    const radius = size / 2.5;
    for (let wall of walls) {
        if (x + radius > wall.x && x - radius < wall.x + wall.w &&
            y + radius > wall.y && y - radius < wall.y + wall.h) {
            return true;
        }
    }
    return false;
}

function getCanvasCoords(e) {
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width / rect.width;
    const scaleY = canvas.height / rect.height;
    let clientX, clientY;
    if (e.touches) {
        clientX = e.touches[0].clientX;
        clientY = e.touches[0].clientY;
        e.preventDefault();
    } else {
        clientX = e.clientX;
        clientY = e.clientY;
    }
    return {
        x: (clientX - rect.left) * scaleX,
        y: (clientY - rect.top) * scaleY
    };
}

function handleCanvasClick(e) {
    const coords = getCanvasCoords(e);
    const screenX = coords.x;
    const screenY = coords.y;

    if (gameState === 'LOGO') {
        gameState = 'MENU';
        return;
    }

    if (gameState === 'MENU') {
        // ROZSZERZONY OBSZAR KLIKALNY - cały ekran!
        // Kliknięcie gdziekolwiek uruchamia grę (domyślnie chłopiec)
        activePlayerSprite = imgRuchChlopca;
        startGame();
        return;
    }

    if (gameState === 'PLAYING') {
        playSound(slashSound);

        activeEffects.push({
            type: 'CLICK',
            followPlayer: true,
            direction: player.currentDirection,
            currentFrame: 0,
            animCounter: 0,
            animSpeed: 4
        });

        let closestMon = null;
        let minDistance = 70;
        pokemons.forEach(mon => {
            if (mon.caught) return;
            const dist = Math.hypot(player.x - mon.x, player.y - mon.y);
            if (dist < minDistance) {
                minDistance = dist;
                closestMon = mon;
            }
        });

        if (closestMon) {
            closestMon.caught = true;
            playSound(disappearSound);
            
            activeEffects.push({
                type: 'DISAPPEAR',
                x: closestMon.x, y: closestMon.y,
                currentFrame: 0, animCounter: 0, animSpeed: 5
            });

            staminaBalls.push({
                x: closestMon.x, y: closestMon.y,
                currentFrame: 0, animCounter: 0, animSpeed: 6
            });

            score++;
            statusScore.textContent = score + '/10';
            
            if (score >= 10) {
                gameState = 'GAMEOVER';
                bgMusic.pause();
            }
        }
    }
}

// FUNKCJE GRY
// ============================================================
function startGame() {
    pokemons = [];
    activeEffects = [];
    staminaBalls = [];
    score = 0;
    gameState = 'PLAYING';
    startTime = Date.now();
    elapsedTime = 0;
    
    statusScore.textContent = '0/10';
    statusTimer.textContent = '0.00s';
    
    statusBar.classList.add('active');
    touchControls.classList.add('active');
    
    player.x = 2000;
    player.y = 2000;
    player.currentDirection = 0;
    player.currentFrame = 0;
    player.isMoving = false;
    player.stamina = 100;

    if (soundEnabled) {
        bgMusic.currentTime = 0;
        bgMusic.play().catch(e => {});
    }

    for (let i = 0; i < 10; i++) {
        let rx, ry, safety = 0;
        do {
            rx = Math.random() * (WORLD_WIDTH - 200) + 100;
            ry = Math.random() * (WORLD_HEIGHT - 200) + 100;
            safety++;
        } while (checkCollision(rx, ry, 24) && safety < 100);

        let vx = (Math.random() - 0.5) * 2.0;
        let vy = (Math.random() - 0.5) * 2.0;

        let initialDir = 0;
        if (Math.abs(vx) > Math.abs(vy)) {
            initialDir = vx > 0 ? 2 : 1;
        } else {
            initialDir = vy > 0 ? 0 : 3;
        }

        pokemons.push({
            x: rx, y: ry,
            vx: vx, vy: vy,
            baseVx: vx, baseVy: vy,
            caught: false,
            currentDirection: initialDir,
            currentFrame: Math.floor(Math.random() * 4),
            animCounter: 0,
            animSpeed: 10 + Math.floor(Math.random() * 5)
        });
    }
}

function resetToMenu() {
    gameState = 'MENU';
    score = 0;
    elapsedTime = 0;
    statusScore.textContent = '0/10';
    statusTimer.textContent = '0.00s';
    
    statusBar.classList.remove('active');
    touchControls.classList.remove('active');
    
    bgMusic.pause();
}

        player.stamina = Math.min(player.maxStamina, player.stamina + 0.30);
    }

        player.speed = player.baseSpeed;
    } else if (player.stamina > 20) {
        player.speed = player.baseSpeed * 0.75;
    } else {
        player.speed = player.baseSpeed * 0.58;
    }

    statusStaminaBar.style.width = player.stamina + '%';
    statusStaminaText.textContent = Math.round(player.stamina);
    if (player.stamina > 60) {
        statusStaminaBar.style.backgroundColor = '#2ecc71';
    } else if (player.stamina > 20) {
        statusStaminaBar.style.backgroundColor = '#f1c40f';
    } else {
        statusStaminaBar.style.backgroundColor = '#e74c3c';
    }

    let nx = player.x, ny = player.y;

    if (keys.w) { ny -= player.speed; player.currentDirection = 3; }
    else if (keys.s) { ny += player.speed; player.currentDirection = 0; }
    if (keys.a) { nx -= player.speed; player.currentDirection = 1; }
    else if (keys.d) { nx += player.speed; player.currentDirection = 2; }

    if (!checkCollision(nx, ny, player.size)) {
        player.x = nx;
        player.y = ny;
    } else {
        if (!checkCollision(nx, player.y, player.size)) player.x = nx;
        else if (!checkCollision(player.x, ny, player.size)) player.y = ny;
    }

    camera.x = player.x - camera.width / 2;
    camera.y = player.y - camera.height / 2;
    if (camera.x < 0) camera.x = 0;
    if (camera.y < 0) camera.y = 0;
    if (camera.x > WORLD_WIDTH - camera.width) camera.x = WORLD_WIDTH - camera.width;
    if (camera.y > WORLD_HEIGHT - camera.height) camera.y = WORLD_HEIGHT - camera.height;

    if (player.isMoving) {
        player.animCounter++;
        let currentAnimSpeed = player.stamina < 20 ? 15 : player.animSpeed;
        if (player.animCounter >= currentAnimSpeed) {
            player.animCounter = 0;
            player.currentFrame = (player.currentFrame + 1) % 4;
        }
    } else {
        player.currentFrame = 0;
    }

    for (let i = staminaBalls.length - 1; i >= 0; i--) {
        const ball = staminaBalls[i];
        ball.animCounter++;
        if (ball.animCounter >= ball.animSpeed) {
            ball.animCounter = 0;
            ball.currentFrame = (ball.currentFrame + 1) % 5;
        }
        const dist = Math.hypot(player.x - ball.x, player.y - ball.y);
        if (dist < 26) {
            player.stamina = Math.min(player.maxStamina, player.stamina + 20);
            staminaBalls.splice(i, 1);
        }
    }

    pokemons.forEach(mon => {
        if (mon.caught) return;

        const dx = mon.x - player.x;
        const dy = mon.y - player.y;
        const dist = Math.hypot(dx, dy);

        let targetVx = mon.baseVx;
        let targetVy = mon.baseVy;

        if (dist < 150) {
            const angle = Math.atan2(dy, dx);
            const runSpeed = 3.5;
            targetVx = Math.cos(angle) * runSpeed;
            targetVy = Math.sin(angle) * runSpeed;
        }

        mon.vx += (targetVx - mon.vx) * 0.1;
        mon.vy += (targetVy - mon.vy) * 0.1;

        let nextX = mon.x + mon.vx;
        let nextY = mon.y + mon.vy;

        if (checkCollision(nextX, mon.y, 24)) {
            mon.vx *= -1;
            mon.baseVx *= -1;
            nextX = mon.x + mon.vx;
        }
        if (checkCollision(mon.x, nextY, 24)) {
            mon.vy *= -1;
            mon.baseVy *= -1;
            nextY = mon.y + mon.vy;
        }

        mon.x = nextX;
        mon.y = nextY;

        if (Math.abs(mon.vx) > Math.abs(mon.vy)) {
            mon.currentDirection = mon.vx > 0 ? 2 : 1;
        } else {
            mon.currentDirection = mon.vy > 0 ? 0 : 3;
        }

        mon.animCounter++;
        let pmAnimSpeed = dist < 150 ? 5 : mon.animSpeed;
        if (mon.animCounter >= pmAnimSpeed) {
            mon.animCounter = 0;
            mon.currentFrame = (mon.currentFrame + 1) % 4;
        }
    });

    for (let i = activeEffects.length - 1; i >= 0; i--) {
        let eff = activeEffects[i];
        eff.animCounter++;
        if (eff.animCounter >= eff.animSpeed) {
            eff.animCounter = 0;
            eff.currentFrame++;
            if (eff.currentFrame >= 5) {
                activeEffects.splice(i, 1);
            }
        }
    }
}

// ============================================================
// DRAW
// ============================================================
function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // LOGO
    if (gameState === 'LOGO') {
        ctx.fillStyle = "#1a1a2e";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        if (logoLoaded && imgLogo.complete && imgLogo.width > 0) {
            const logoX = (canvas.width - imgLogo.width) / 2;
            const logoY = (canvas.height - imgLogo.height) / 2;
            ctx.drawImage(imgLogo, logoX, logoY, imgLogo.width, imgLogo.height);
        } else {
            ctx.fillStyle = "#f1c40f";
            ctx.font = "bold 60px 'Courier New', Courier, monospace";
            ctx.textAlign = "center";
            ctx.fillText("DOKEMON", canvas.width / 2, canvas.height / 2 - 30);
            ctx.fillStyle = "#ffffff";
            ctx.font = "bold 24px 'Courier New', Courier, monospace";
            ctx.fillText("Kliknij aby rozpocząć", canvas.width / 2, canvas.height / 2 + 50);
        }
        return;
    }

    // MENU - NADAL RYSUJEMY, ALE KLIKNIĘCIE WSZĘDZIE PRZECHODZI DO GRY
    if (gameState === 'MENU') {
        if (imgMenuBg.complete && imgMenuBg.width > 0) {
            ctx.drawImage(imgMenuBg, 0, 0, canvas.width, canvas.height);
        } else {
            ctx.fillStyle = "#1e1e24";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }
        if (imgImieBohatera.complete) ctx.drawImage(imgImieBohatera, 253, 110, 193, 104);
        if (imgImieBohaterki.complete) ctx.drawImage(imgImieBohaterki, 643, 110, 193, 104);
        if (imgChlopiecLarge.complete) ctx.drawImage(imgChlopiecLarge, boyBox.x, 210, 240, 480);
        if (imgDziewczynaLarge.complete) ctx.drawImage(imgDziewczynaLarge, girlBox.x, 210, 240, 480);
        if (imgWybierzBohatera.complete) ctx.drawImage(imgWybierzBohatera, 231, 20, 638, 97);
        return;
    }

    // GRA
    ctx.save();
    ctx.translate(-camera.x, -camera.y);

    if (!useFallbackBg && imgBackground.complete && imgBackground.width > 0) {
        ctx.drawImage(imgBackground, 0, 0, WORLD_WIDTH, WORLD_HEIGHT);
    }

    staminaBalls.forEach(ball => {
        if (imgKulka.complete && imgKulka.width > 0) {
            const ballSx = ball.currentFrame * 48;
            ctx.drawImage(imgKulka, ballSx, 0, 48, 48, ball.x - 24, ball.y - 24, 48, 48);
        }
    });

    pokemons.forEach((mon, i) => {
        if (mon.caught) return;
        if (pokemonImages[i] && pokemonImages[i].complete && pokemonImages[i].width > 0) {
            const pmSx = mon.currentFrame * 48;
            const pmSy = mon.currentDirection * 48;
            ctx.drawImage(pokemonImages[i], pmSx, pmSy, 48, 48, mon.x - 24, mon.y - 24, 48, 48);
        }
    });

    activeEffects.forEach(eff => {
        const effSx = eff.currentFrame * 48;
        if (eff.type === 'DISAPPEAR' && imgZnikniecie.complete && imgZnikniecie.width > 0) {
            ctx.drawImage(imgZnikniecie, effSx, 0, 48, 48, eff.x - 24, eff.y - 24, 48, 48);
        } else if (eff.type === 'CLICK' && imgKlikniecie.complete && imgKlikniecie.width > 0) {
            let dx = player.x, dy = player.y;
            if (eff.direction === 0) dy += 15;
            else if (eff.direction === 1) dx -= 15;
            else if (eff.direction === 2) dx += 15;
            else if (eff.direction === 3) dy -= 15;
            ctx.drawImage(imgKlikniecie, effSx, 0, 48, 48, dx - 24, dy - 24, 48, 48);
        }
    });

    const sx = player.currentFrame * player.spriteWidth;
    const sy = player.currentDirection * player.spriteHeight;
    ctx.drawImage(activePlayerSprite, sx, sy, player.spriteWidth, player.spriteHeight, player.x - 24, player.y - 24, 48, 48);

    if (!useFallbackTop && imgTopLayer.complete && imgTopLayer.width > 0) {
        ctx.drawImage(imgTopLayer, 0, 0, WORLD_WIDTH, WORLD_HEIGHT);
    }

    ctx.restore();

    if (gameState === 'GAMEOVER') {
        if (finishLoaded && imgFinish.complete && imgFinish.width > 0) {
            const fx = (canvas.width - imgFinish.width) / 2;
            const fy = (canvas.height - imgFinish.height) / 2;
            ctx.drawImage(imgFinish, fx, fy, imgFinish.width, imgFinish.height);
        } else {
            ctx.fillStyle = "rgba(0, 0, 0, 0.85)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }
        
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillStyle = "#f1c40f";
        ctx.font = "bold 80px 'Courier New', Courier, monospace";
        ctx.shadowColor = "rgba(0,0,0,0.8)";
        ctx.shadowBlur = 20;
        ctx.fillText(elapsedTime + "s", canvas.width / 2, canvas.height / 2 + 10);
        ctx.shadowBlur = 0;
    }
}

function loop() { update(); draw(); requestAnimationFrame(loop); }
loop();
</script>
